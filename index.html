<!DOCTYPE html>
<html>
<head>
    <title>Forum Estudante</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>📢 Forum Diskusaun Estudante</h1>
    </header>

    <!-- 👨‍🏫 APRESENTADOR -->
    <section class="card">
        <img src="/static/presenter.jpg">
        <div>
            <h2>Apresentador: João Silva</h2>
            <p>Professor de Tecnologia da Informação</p>
        </div>
    </section>

    <!-- 📌 TOPIKU -->
    <section class="card">
        <img src="/static/topic.jpg">
        <div>
            <h2>Topiku: Estrutura Website</h2>
            <p>Diskusaun kona-ba front-end, back-end no server.</p>
        </div>
    </section>

    <!-- 📄 UPLOAD DOKUMENTU -->
    <section class="box">
        <h3>📄 Upload Dokumentu</h3>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file">
            <button type="submit">Upload</button>
        </form>
    </section>

    <!-- 💬 POST -->
    <section class="box">
        <h3>Hatama Diskusaun</h3>

        <form action="/post" method="post">
            <input type="text" name="name" placeholder="Naran estudante" required>
            <textarea name="comment" placeholder="Ita nia opiniaun" required></textarea>
            <button type="submit">Submete</button>
        </form>
    </section>

    <!-- 💬 LISTA POST -->
    <section class="box">
        <h3>Respostas</h3>

        {% for p in posts %}
            <div class="comment">
                <b>{{ p.name }}</b><br>
                {{ p.comment }}
            </div>
        {% endfor %}
    </section>

</body>
</html>
